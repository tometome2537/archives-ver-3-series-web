name: Update Data

on:

#   GitHub UI から手動で実行できるようにする
  workflow_dispatch:

  schedule:
    # 毎日 JST 9:00 (UTC 0:00)
    - cron: "0 0 * * *"

# GitHub Actions の書き込み権限を許可する
permissions:
  contents: write

jobs:
  update:
    # Ubuntu 最新版で実行する
    runs-on: ubuntu-latest

    steps:
      # GitHubのリポジトリをGithub Actionsにコピーする
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      # npm install と違い、package-lock.json に従って正確にインストールする
      - name: Install dependencies
        run: npm ci

      - name: Run update
        run: npm run update

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .

          # 変更が無ければ終了
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "chore: auto update"
            git push
          fi
